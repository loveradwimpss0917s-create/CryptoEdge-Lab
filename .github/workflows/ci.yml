name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ts:
    name: TypeScript (lint / typecheck / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run typecheck
      - run: pnpm turbo run test
      - run: pnpm turbo run lint
      - run: pnpm --filter @cryptoedge/web build

  migrations:
    name: D1 migrations apply cleanly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # docs/11 §5: migrations must apply cleanly to an empty local D1 before merge.
      - run: pnpm exec wrangler d1 migrations apply cryptoedge --local --config apps/api/wrangler.jsonc

  research:
    name: Python (ruff / pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: research
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.x"
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run pytest
