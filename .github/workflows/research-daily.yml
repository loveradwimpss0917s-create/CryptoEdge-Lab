name: research-daily

# docs/01 §3.2: the ingest Worker's repository_dispatch is the primary
# trigger; `schedule:` here is only a backup in case that dispatch is
# missed (GitHub scheduled triggers can be delayed/skipped under load).
on:
  repository_dispatch:
    types: [research-daily]
  schedule:
    - cron: "30 2 * * *" # ~30min after the ingest Worker's tick-1d (docs/01 §4.6)
  workflow_dispatch: {}

jobs:
  daily-light:
    runs-on: ubuntu-latest
    timeout-minutes: 20 # docs/13 §3 budget: ~10min typical, generous ceiling
    defaults:
      run:
        working-directory: research
    env:
      CRYPTOEDGE_API_URL: ${{ secrets.CRYPTOEDGE_API_URL }}
      RESEARCH_API_TOKEN: ${{ secrets.RESEARCH_API_TOKEN }}
      CRYPTOEDGE_R2_ENDPOINT: ${{ secrets.CRYPTOEDGE_R2_ENDPOINT }}
      CRYPTOEDGE_R2_BUCKET: ${{ secrets.CRYPTOEDGE_R2_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.x"
      - run: uv sync
      - run: uv run python -m cryptoedge_research.jobs.nightly
