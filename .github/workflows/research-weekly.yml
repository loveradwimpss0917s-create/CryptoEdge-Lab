name: research-weekly

# docs/01 §3.2, docs/09 §4: Discovery screening, HMM/correlation updates,
# R2 Parquet compaction, D1 backups. V1/Phase 2 has not yet implemented
# the Discovery Engine (docs/04 §5, roadmap P2) — this workflow is wired
# up now so the trigger plumbing exists, but currently only runs the
# on-demand job entry point against any jobs already queued, rather than
# fabricating a weekly-specific script ahead of that work landing.
on:
  repository_dispatch:
    types: [research-weekly]
  schedule:
    - cron: "0 3 * * 0" # matches the ingest Worker's tick-weekly (docs/01 §4.6)
  workflow_dispatch: {}

jobs:
  weekly-heavy:
    runs-on: ubuntu-latest
    timeout-minutes: 120 # docs/13 §3 budget: ~90min typical
    defaults:
      run:
        working-directory: research
    env:
      CRYPTOEDGE_API_URL: ${{ secrets.CRYPTOEDGE_API_URL }}
      RESEARCH_API_TOKEN: ${{ secrets.RESEARCH_API_TOKEN }}
      CRYPTOEDGE_R2_ENDPOINT: ${{ secrets.CRYPTOEDGE_R2_ENDPOINT }}
      CRYPTOEDGE_R2_BUCKET: ${{ secrets.CRYPTOEDGE_R2_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.x"
      - run: uv sync
      - name: Drain queued on-demand jobs
        run: uv run python -m cryptoedge_research.jobs.on_demand
