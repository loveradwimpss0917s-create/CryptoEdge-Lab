name: deploy

# docs/12 §1: main-branch pushes deploy both Workers. D1 migrations run
# first so a deploy never ships code expecting a schema that isn't there
# yet (docs/02 header: migrations are forward-only, so this is always safe
# to run repeatedly).
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # docs/12 §1 review finding (High): a red test/lint/typecheck must
      # block the deploy, not just run alongside it in a separate ci.yml.
      - run: pnpm turbo run typecheck
      - run: pnpm turbo run test
      - run: pnpm turbo run lint
      - run: pnpm --filter @cryptoedge/web build
      - name: Apply D1 migrations
        run: pnpm exec wrangler d1 migrations apply cryptoedge --remote --config apps/api/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy api Worker (serves the built SPA via Static Assets)
        run: pnpm exec wrangler deploy --config apps/api/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy ingest Worker
        run: pnpm exec wrangler deploy --config workers/ingest/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Smoke test — api Worker responds after deploy
        # docs/19 S-01 / docs/17 Z-6: this hostname sits behind a Cloudflare
        # Access Zero Trust Application, which gates every request at the
        # edge before it ever reaches our Worker -- so an unauthenticated
        # curl from this runner can never see a real 200 from
        # /api/v1/healthz (Access itself returns 302/403 first, regardless
        # of what our own requireAccess middleware would decide). Treating
        # only 200 as "healthy" makes this step permanently red and masks
        # real failures (e.g. the Asset-too-large deploy break, f2ad81b).
        # 200/302/403 all mean "the edge responded as designed"; anything
        # else (5xx, curl connection failure) is a real outage.
        # TODO (docs/19 S-20): once Access Service Token auth lands, curl
        # with CF-Access-Client-Id/Secret here to get a real 200 and
        # restore an actual end-to-end health check instead of this
        # edge-reachability check.
        run: |
          for i in 1 2 3 4 5; do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://cryptoedge-api.loveradwimps-s0917s.workers.dev/api/v1/healthz)
            case "$status" in
              200|302|403)
                echo "healthz responded $status (edge reachable)"
                exit 0
                ;;
            esac
            echo "attempt $i: healthz returned $status, retrying..."
            sleep 5
          done
          echo "healthz did not respond after deploy (last status: $status)"
          exit 1
